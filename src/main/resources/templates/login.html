<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Login</title>

<style>

body{

    font-family:Arial;

    background:#0f172a;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

}

.card{

    background:white;

    width:350px;

    padding:30px;

    border-radius:10px;

}

input{

    width:100%;

    padding:12px;

    margin:10px 0;

}

button{

    width:100%;

    padding:12px;

    background:#6d5dfc;

    color:white;

    border:none;

}

a{

    display:block;

    text-align:center;

    margin-top:15px;

}

</style>

</head>

<body>
	
<div class="card">

<h2>Login</h2>
<div th:if="${param.error}"
     style="color:red;text-align:center;margin-bottom:15px;">
    Invalid Email or Password
</div>

<div th:if="${param.logout}"
     style="color:green;text-align:center;margin-bottom:15px;">
    Logged out successfully
</div>
<div th:if="${param.registered}"
	     style="color:green;text-align:center;margin-bottom:15px;">
	    Registration Successful. Please Login.
	</div>
<form th:action="@{/login}" method="post">

    <input
        type="text"
        name="username"
        placeholder="Enter Email"
        required>

    <input
        type="password"
        name="password"
        placeholder="Enter Password"
        required>

    <button type="submit">
        Login
    </button>

</form>

<a href="/signup">

Create Account

</a>

</div>

</body>

</html>
