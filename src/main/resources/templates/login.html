<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login • TaskFlow Studio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ==========================================
   1. PREMIUM DESIGN TOKENS & METRICS
   ========================================== */
:root {
    --bg-canvas: #090a0f;
    --bg-surface: rgba(18, 20, 29, 0.65);
    --border-subtle: rgba(255, 255, 255, 0.06);
    --border-interactive: rgba(255, 255, 255, 0.12);
    --border-focus: #6366f1;
    
    /* Cosmic Gradient System */
    --brand-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    --brand-glow: rgba(99, 102, 241, 0.25);
    
    /* High Contrast Typography */
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --text-muted: #475569;
    
    /* Dynamic Notification System Colors */
    --color-error: #f87171;
    --bg-error: rgba(248, 113, 113, 0.08);
    --border-error: rgba(248, 113, 113, 0.2);
    
    --color-success: #34d399;
    --bg-success: rgba(52, 211, 153, 0.08);
    --border-success: rgba(52, 211, 153, 0.2);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
}

body {
    background-color: var(--bg-canvas);
    background-image: 
        radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 40%),
        radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.12) 0px, transparent 40%);
    background-attachment: fixed;
    color: var(--text-primary);
    min-height: 100vh;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ==========================================
   2. CONTAINERS & PLATFORM FRAMES
   ========================================== */
.card {
    width: 400px;
    max-width: 100%;
    background: var(--bg-surface);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border-subtle);
    border-radius: 24px;
    padding: 40px 36px;
    box-shadow: 
        0 4px 30px rgba(0, 0, 0, 0.4),
        0 20px 50px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    animation: authReveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
}

/* ==========================================
   3. BRAND ARCHITECTURE HEADER
   ========================================== */
.auth-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
}

.brand-logo-icon {
    width: 44px;
    height: 44px;
    background: var(--brand-gradient);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 24px var(--brand-glow);
}

.brand-logo-icon svg {
    width: 24px;
    height: 24px;
    stroke: #ffffff;
    stroke-width: 2.5;
}

h2 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* ==========================================
   4. INTERACTIVE INPUT FIELDS & LABELS
   ========================================== */
.form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
}

label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding-left: 2px;
}

input {
    background-color: rgba(13, 14, 22, 0.7);
    border: 1px solid var(--border-interactive);
    border-radius: 10px;
    color: var(--text-primary);
    padding: 13px 16px;
    font-size: 0.875rem;
    font-weight: 500;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    outline: none;
    width: 100%;
}

input:hover {
    border-color: rgba(255, 255, 255, 0.25);
    background-color: rgba(13, 14, 22, 0.9);
}

input:focus {
    border-color: var(--border-focus);
    background-color: #07080c;
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
}

/* ==========================================
   5. PREMIUM CONTEXTUAL NOTIFICATION BARS
   ========================================== */
.alert-box {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 0.813rem;
    font-weight: 500;
    margin-bottom: 20px;
    border-left: 3px solid transparent;
}

.alert-error {
    background-color: var(--bg-error);
    border: 1px solid var(--border-error);
    border-left-color: var(--color-error);
    color: var(--color-error);
}

.alert-success {
    background-color: var(--bg-success);
    border: 1px solid var(--border-success);
    border-left-color: var(--color-success);
    color: var(--color-success);
}

.alert-box svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
}

/* ==========================================
   6. ACTION PORTAL BUTTONS & UTILITIES
   ========================================== */
button {
    width: 100%;
    background: var(--brand-gradient);
    color: #ffffff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 14px rgba(79, 70, 233, 0.3);
    margin-top: 8px;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 22px rgba(79, 70, 233, 0.45);
    filter: brightness(1.1);
}

button:active {
    transform: translateY(1px);
}

.signup-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    margin-top: 18px;
    padding: 13px;
    font-size: 0.875rem;
    font-weight: 600;
    text-decoration: none;
    color: var(--text-primary);
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--border-interactive);
    border-radius: 10px;
    transition: all 0.2s ease;
}

.signup-link:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.25);
}

/* ==========================================
   7. ANIMATIONS
   ========================================== */
@keyframes authReveal {
    0% { opacity: 0; transform: scale(0.97) translateY(8px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
}
/* ==========================================
   8. RESPONSIVE DESIGN
========================================== */

/* Tablets */
@media (max-width:768px){

    body{
        padding:24px;
        align-items:center;
    }

    .card{
        width:100%;
        max-width:500px;
        padding:32px 28px;
        border-radius:20px;
    }

    h2{
        font-size:1.35rem;
        text-align:center;
    }

    .brand-logo-icon{
        width:42px;
        height:42px;
    }

    .brand-logo-icon svg{
        width:22px;
        height:22px;
    }

    input{
        padding:14px;
        font-size:15px;
    }

    button,
    .signup-link{
        padding:14px;
        font-size:15px;
    }

    .alert-box{
        font-size:14px;
    }
}

/* Mobile */
@media (max-width:480px){

    body{
        padding:16px;
    }

    .card{
        width:100%;
        padding:24px 20px;
        border-radius:18px;
    }

    .auth-header{
        margin-bottom:24px;
    }

    .brand-logo-icon{
        width:38px;
        height:38px;
        border-radius:10px;
    }

    .brand-logo-icon svg{
        width:20px;
        height:20px;
    }

    h2{
        font-size:1.2rem;
        line-height:1.4;
        text-align:center;
    }

    .form-group{
        margin-bottom:16px;
    }

    label{
        font-size:11px;
    }

    input{
        padding:13px;
        font-size:14px;
    }

    button,
    .signup-link{
        width:100%;
        padding:13px;
        font-size:14px;
    }

    .alert-box{
        padding:12px;
        font-size:13px;
    }

    .alert-box svg{
        width:15px;
        height:15px;
    }
}

/* Small Mobile */
@media (max-width:360px){

    body{
        padding:12px;
    }

    .card{
        padding:20px 16px;
    }

    h2{
        font-size:1.05rem;
    }

    input,
    button,
    .signup-link{
        font-size:13px;
    }
}
</style>
</head>

<body>
	
<div class="card">

    <div class="auth-header">
        <div class="brand-logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        <h2>Welcome to TaskFlow</h2>
    </div>

    <div th:if="${param.error}" class="alert-box alert-error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <span>Invalid Email or Password</span>
    </div>

    <div th:if="${param.logout}" class="alert-box alert-success">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <span>Logged out successfully</span>
    </div>

    <div th:if="${param.registered}" class="alert-box alert-success">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <span>Registration Successful. Please Login.</span>
    </div>

    <form th:action="@{/login}" method="post">

        <div class="form-group">
            <label for="username-field">Email Address</label>
            <input id="username-field" type="text" name="username" placeholder="name@company.com" required autocomplete="email">
        </div>

        <div class="form-group">
            <label for="password-field">Password</label>
            <input id="password-field" type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
            Sign In to Workspace
        </button>

    </form>

    <a href="/signup" class="signup-link">
        Create an Account
    </a>

</div>

</body>
</html>
