<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - TaskFlow</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:380px;
            background:white;
            padding:35px;
            border-radius:10px;
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:12px;
            background:#6d5dfc;
            color:white;
            border:none;
            cursor:pointer;
            border-radius:5px;
            margin-top:15px;
        }

        a{
            display:block;
            text-align:center;
            margin-top:15px;
        }
    </style>

</head>
<body>

<div class="card">

    <h2>Create Account</h2>
	<p th:if="${error}"
	   th:text="${error}"
	   style="color:red;text-align:center;margin-bottom:15px;">
	</p>

    <form th:action="@{/signup}" th:object="${user}" method="post">

        <input type="text"
               th:field="*{name}"
               placeholder="Full Name"
               required>

        <input type="email"
               th:field="*{email}"
               placeholder="Email"
               required>

        <input type="password"
               th:field="*{password}"
               placeholder="Password"
               required>

        <button type="submit">
            Sign Up
        </button>

    </form>

    <a href="/login">
        Already have an account?
    </a>

</div>

</body>
</html>
